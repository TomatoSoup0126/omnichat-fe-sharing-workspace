[build]
  command = "pnpm install && pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"

# SPA fallback for individual Slidev presentations (must come before catch-all)
[[redirects]]
  from = "/:year/:slug/*"
  to = "/:year/:slug/index.html"
  status = 200

# SPA fallback for the overview page (catch-all)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: set custom headers for better performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
